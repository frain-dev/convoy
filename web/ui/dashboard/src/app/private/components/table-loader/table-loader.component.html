<div class="min-h-[60vh] border-none">
  <table convoy-table>
    <thead convoy-table-head>
      @for (head of tableHead; track $index; let i = $index) {
        <th convoy-table-head-cell [class]="i === 0 ? 'pl-16px uppercase' : 'uppercase'">{{ head }}</th>
      }
    </thead>
    <tbody>
      @if (withDate) {
        <tr convoy-table-row [forDate]="true">
          <td convoy-table-cell [forDate]="true"><convoy-skeleton-loader className="w-160px h-20px"></convoy-skeleton-loader></td>
          @for (head of tableHead.slice(1); track $index) {
            <td convoy-table-cell [forDate]="true"></td>
          }
        </tr>
      }
      @for (index of loaderIndex; track $index) {
        <tr convoy-table-row>
          <td convoy-table-cell class="pl-16px">
            <convoy-skeleton-loader className="w-120px h-20px"></convoy-skeleton-loader>
          </td>
          @for (head of tableHead.slice(1); track $index) {
            <td convoy-table-cell>
              <convoy-skeleton-loader className="w-100px h-20px"></convoy-skeleton-loader>
            </td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
