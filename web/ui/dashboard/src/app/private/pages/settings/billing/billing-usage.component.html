<div class="billing-usage">
  <h2 class="billing-section-title">Usage</h2>

  @if (isFetchingUsage) {
    <div convoy-card>
      <convoy-table-loader [withDate]="false" [tableHead]="tableHead"></convoy-table-loader>
    </div>
  }

  @if (!isFetchingUsage) {
    <div convoy-card>
      <div class="overflow-x-auto w-full">
      <table convoy-table>
        <thead convoy-table-head>
          @for (head of tableHead; track $index; let i = $index) {
            <th convoy-table-head-cell [ngClass]="{ 'pl-20px': i === 0 }">{{ head }}</th>
          }
        </thead>
        <tbody>
          @for (row of usageRows; track $index) {
            <tr convoy-table-row class="border border-primary-500">
              <td convoy-table-cell class="pl-20px">{{ row.name }}</td>
              <td convoy-table-cell>{{ row.received }}</td>
              <td convoy-table-cell>{{ row.sent }}</td>
              <td convoy-table-cell>{{ row.total }}</td>
            </tr>
          }
        </tbody>
      </table>
      </div>
    </div>
  }
</div>
