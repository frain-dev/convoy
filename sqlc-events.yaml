version: "2"

servers:
  - engine: postgresql
    uri: postgres://${CONVOY_DB_USERNAME}:${CONVOY_DB_PASSWORD}@${CONVOY_DB_HOST}:${CONVOY_DB_PORT}/${CONVOY_DB_DATABASE}?sslmode=disable

sql:
  - queries: ./internal/events/queries.sql
    engine: postgresql
    database:
      uri: "postgres://${CONVOY_DB_USERNAME}:${CONVOY_DB_PASSWORD}@${CONVOY_DB_HOST}:${CONVOY_DB_PORT}/${CONVOY_DB_DATABASE}?sslmode=disable"
    gen:
      go:
        package: "repo"
        out: "./internal/events/repo"
        sql_package: "pgx/v5"
        omit_unused_structs: true
        emit_interface: true
