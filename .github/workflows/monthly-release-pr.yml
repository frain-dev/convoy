name: Monthly Release PR

on:
  schedule:
    - cron: "0 2 28-31 * *"
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  prepare-release:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-plan.outputs.version }}
      should_run: ${{ steps.release-target.outputs.should_run }}
    steps:
      - name: Check if last day of month (schedule only)
        id: check-day
        run: ./scripts/release-workflow.sh should-run --event-name "${{ github.event_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: ${{ steps.check-day.outputs.should_run == 'true' }}
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch tags
        if: ${{ steps.check-day.outputs.should_run == 'true' }}
        run: |
          git fetch --tags --force origin

      - name: Build release plan
        id: release-plan
        if: ${{ steps.check-day.outputs.should_run == 'true' }}
        run: ./scripts/release-workflow.sh monthly-plan >> "$GITHUB_OUTPUT"

      - name: Create current month cutoff tag
        if: ${{ steps.check-day.outputs.should_run == 'true' }}
        run: ./scripts/release-workflow.sh ensure-cutoff-tag --tag "${{ steps.release-plan.outputs.current_cutoff_tag }}"

      - name: Resolve release target
        id: release-target
        if: ${{ steps.check-day.outputs.should_run == 'true' }}
        run: ./scripts/release-workflow.sh resolve-target --release-cutoff-tag "${{ steps.release-plan.outputs.release_cutoff_tag }}" --version "${{ steps.release-plan.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        if: ${{ steps.release-target.outputs.should_run == 'true' }}
        uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31 # v2
        with:
          tool: git-cliff

      - name: Update changelog
        if: ${{ steps.release-target.outputs.should_run == 'true' }}
        run: ./scripts/release-workflow.sh render-changelog --version "${{ steps.release-plan.outputs.version }}" --target-sha "${{ steps.release-target.outputs.target_sha }}" --previous-stable-tag "${{ steps.release-target.outputs.previous_stable_tag }}"

      - name: Write release manifest
        if: ${{ steps.release-target.outputs.should_run == 'true' }}
        run: ./scripts/release-workflow.sh write-manifest --version "${{ steps.release-plan.outputs.version }}" --release-line "${{ steps.release-plan.outputs.release_line }}" --target-sha "${{ steps.release-target.outputs.target_sha }}" --cutoff-tag "${{ steps.release-plan.outputs.release_cutoff_tag }}" --next-cutoff-tag "${{ steps.release-plan.outputs.current_cutoff_tag }}" --previous-stable-tag "${{ steps.release-target.outputs.previous_stable_tag }}"

      - name: Create release PR
        if: ${{ steps.release-target.outputs.should_run == 'true' }}
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "chore(release): prepare v${{ steps.release-plan.outputs.version }}"
          title: "chore(release): prepare v${{ steps.release-plan.outputs.version }}"
          body: |
            Automated changelog update for the monthly release.

            **Version:** `v${{ steps.release-plan.outputs.version }}`
            **Release line:** `${{ steps.release-plan.outputs.release_line }}`
            **Release cutoff tag:** `${{ steps.release-plan.outputs.release_cutoff_tag }}`
            **Target SHA:** `${{ steps.release-target.outputs.target_sha }}`
            **Next cutoff tag:** `${{ steps.release-plan.outputs.current_cutoff_tag }}`
          branch: "chore/monthly-release"
          base: "main"

  trigger-tag-stable-release:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'chore/monthly-release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Read release manifest
        id: manifest
        run: ./scripts/release-workflow.sh read-manifest >> "$GITHUB_OUTPUT"

      - name: Trigger tag-stable-release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "tag-stable-release.yml" \
            --ref main \
            --repo "${{ github.repository }}" \
            -f version="${{ steps.manifest.outputs.version }}" \
            -f target_sha="${{ steps.manifest.outputs.target_sha }}"
