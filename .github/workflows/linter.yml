name: golangci-lint
on:
  pull_request:
  merge_group:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_backend: ${{ steps.filter.outputs.has_backend }}
    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # has_backend is true when ANY changed file is NOT under web/ui/dashboard/**
      # or docs/**. With predicate-quantifier 'every', a file counts only if it
      # matches '**' AND none of the negated frontend globs, so a single .go/go.mod/
      # cmd/** change (or a change to this workflow) marks the set as backend. Lint
      # runs unless has_backend is explicitly 'false', so the gate is fail-safe.
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@668c092af3649c4b664c54e4b704aa46782f6f7c # v3
        with:
          predicate-quantifier: 'every'
          filters: |
            has_backend:
              - '**'
              - '!web/ui/dashboard/**'
              - '!docs/**'

  backend-lint:
    name: Lint
    needs: changes
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        if: ${{ needs.changes.outputs.has_backend != 'false' }}
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: golangci-lint
        if: ${{ needs.changes.outputs.has_backend != 'false' }}
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          args: --config=.golangci.yml --timeout 5m --verbose
          only-new-issues: 'true'
          version: v2.9
