name: Tag Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer version to tag (e.g., 26.2.0)"
        required: true
        type: string
      target_sha:
        description: "Commit SHA to tag for this release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Log version
        run: |
          echo "Tagging version: v${{ inputs.version }}"
          echo "Target SHA: ${{ inputs.target_sha }}"

      - name: Create and push tag
        run: |
          ./scripts/tag-release.sh "${{ inputs.version }}" "${{ inputs.target_sha }}"
