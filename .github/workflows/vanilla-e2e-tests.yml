name: Build and Run Vanilla E2E tests
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'internal/**'
      - 'pkg/**'
      - 'plugin/**'
      - 'services/**'
      - 'util/**'
      - 'worker/**'
      - 'webhook/**'
      - 'net/**'
      - 'datastore/**'
      - 'database/**'
      - 'migrations/**'
      - 'sql/**'
      - 'e2e/**'
      - 'scripts/**'
      - 'testutil/**'
      - 'docker-compose*.yml'
      - 'Dockerfile*'
      - '.github/workflows/vanilla-e2e-tests.yml'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pubsub-tests:
    runs-on: ubuntu-latest
    env:
      GO_TEST_RACE: '1'
      GO_TEST_VERBOSE: '0'
      TEST_VERBOSE: '0'
    strategy:
      matrix:
        go-version: [1.26.2]
        postgres-version: ["15"]
        redis-version: ["6.2.6"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: convoy
          POSTGRES_PASSWORD: postgres
          POSTGRES_MAX_CONNECTIONS: 2000
        options: --health-cmd pg_isready --health-interval 10ms --health-timeout 500ms --health-retries 15
      redis:
        image: redis:${{ matrix.redis-version }}
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Get and verify dependencies
        run: go mod download && go mod verify

      - name: Migrate Postgres
        run: go run ./cmd migrate up
        env:
          CONVOY_DB_SCHEME: postgres
          CONVOY_DB_HOST: localhost
          CONVOY_DB_USERNAME: postgres
          CONVOY_DB_PASSWORD: postgres
          CONVOY_DB_DATABASE: convoy
          CONVOY_DB_OPTIONS: sslmode=disable&connect_timeout=30
          CONVOY_DB_PORT: 5432
          CONVOY_REDIS_SCHEME: redis
          CONVOY_REDIS_HOST: localhost
          CONVOY_REDIS_PORT: 6379

      - name: Run Fast E2E tests (testcontainers)
        run: make test_e2e_fast
        env:
          TEST_LICENSE_KEY: ${{ secrets.CONVOY_TEST_LICENSE_KEY }}
          CONVOY_LICENSE_KEY: ${{ secrets.CONVOY_TEST_LICENSE_KEY }}
          CONVOY_LOCAL_ENCRYPTION_KEY: ${{ secrets.CONVOY_TEST_ENCRYPTION_KEY }}
          CONVOY_DISPATCHER_SKIP_PING_VALIDATION: true
