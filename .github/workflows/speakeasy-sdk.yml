name: Speakeasy SDK regeneration

# When public OpenAPI artifacts change on main (or via manual dispatch), kick
# SDK generation in convoy.js / convoy-python / convoy-java. SDK repos pull
# docs/v3/openapi3.yaml from this repository. Each repo owns its generator
# (convoy.js: Speakeasy; convoy-python: openapi-python-client; convoy-java:
# OpenAPI Generator) behind the same sdk_generation.yaml filename and inputs.
#
# Required repository secrets:
#   SPEAKEASY_API_KEY   — Speakeasy workspace API key (also required on convoy.js)
#   SDK_REPOS_PAT       — GitHub PAT (or fine-grained token) that can
#                         workflow_dispatch and open/edit PRs on
#                         frain-dev/convoy.js, frain-dev/convoy-python and
#                         frain-dev/convoy-java

on:
  push:
    branches:
      - main
    paths:
      - "docs/v3/openapi3.yaml"
      - "docs/v3/openapi3.json"
      - ".speakeasy/workflow.yaml"
      - ".github/workflows/speakeasy-sdk.yml"
  workflow_dispatch:
    inputs:
      force:
        description: Force SDK regeneration even if Speakeasy detects no changes
        type: boolean
        default: true
      feature_branch:
        description: Optional feature branch name for downstream SDK PRs
        type: string
        required: false

# Cross-repo dispatch and PR linking use SDK_REPOS_PAT, not GITHUB_TOKEN.
permissions:
  contents: read

# Serialize regenerations so concurrent pushes to main don't race each
# other's dispatched-run discovery on the SDK repos.
concurrency:
  group: speakeasy-sdk
  cancel-in-progress: false

jobs:
  prepare-spec:
    name: Validate OpenAPI source
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Ensure required secrets are configured
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
          SDK_REPOS_PAT: ${{ secrets.SDK_REPOS_PAT }}
        run: |
          missing=0
          if [ -z "$SPEAKEASY_API_KEY" ]; then
            echo "::error::SPEAKEASY_API_KEY secret is not configured"
            missing=1
          fi
          if [ -z "$SDK_REPOS_PAT" ]; then
            echo "::error::SDK_REPOS_PAT secret is not configured (token that can open PRs on SDK repos)"
            missing=1
          fi
          exit "$missing"

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          install: false
          cache: true

      - name: Install OpenAPI CLI
        run: |
          # Prefer the pinned openapi binary over `curl | sh` Speakeasy CLI install.
          mise install "ubi:speakeasy-api/openapi"
          echo "$(dirname "$(mise which openapi)")" >> "$GITHUB_PATH"
          command -v openapi

      - name: Validate OpenAPI document
        run: openapi spec validate docs/v3/openapi3.yaml

  trigger-sdk-repos:
    name: Trigger ${{ matrix.repo }} generation
    needs: prepare-spec
    runs-on: ubuntu-latest
    # Speakeasy generation + PR creation can exceed 30m under load / free tier.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: typescript
            repo: convoy.js
          - language: python
            repo: convoy-python
          - language: java
            repo: convoy-java
    steps:
      - name: Prepare feature branch
        id: branch
        env:
          # Never interpolate free-form dispatch inputs into run: directly.
          FEATURE_BRANCH_INPUT: ${{ inputs.feature_branch }}
        run: |
          if [ -n "$FEATURE_BRANCH_INPUT" ]; then
            # SDK PRs must come from a reviewable feature branch, never a
            # protected ref or an option-looking / metacharacter name.
            case "$FEATURE_BRANCH_INPUT" in
              main|master|release/*|-*|*[!a-zA-Z0-9._/-]*)
                echo "::error::Invalid feature_branch '$FEATURE_BRANCH_INPUT'"
                exit 1
                ;;
            esac
            echo "name=$FEATURE_BRANCH_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "name=speakeasy-sdk-regen-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch SDK generation workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.SDK_REPOS_PAT }}
          REPO: ${{ matrix.repo }}
          # Map the boolean explicitly: honor a dispatched force=false and
          # default pushes (no inputs context) to force=true.
          FORCE_INPUT: ${{ github.event_name == 'workflow_dispatch' && (inputs.force && 'true' || 'false') || 'true' }}
          FEATURE_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          owner="frain-dev"
          repo="$REPO"
          force="$FORCE_INPUT"
          feature_branch="$FEATURE_BRANCH"

          # Capture a lower bound before dispatch so we don't pick up an older
          # concurrent cron / workflow_dispatch run. Backdate slightly so
          # runner-vs-GitHub clock skew can't hide our own run.
          dispatched_after=$(date -u -d '5 seconds ago' +%Y-%m-%dT%H:%M:%SZ)

          gh workflow run sdk_generation.yaml \
            --repo "$owner/$repo" \
            --ref main \
            --field force="$force" \
            --field feature_branch="$feature_branch"

          run_id=""
          for _ in $(seq 1 30); do
            # gh --jq does not accept jq --arg; pipe JSON to jq instead.
            # `|| true` keeps a transient API failure inside the retry loop
            # instead of failing the step under `set -e -o pipefail`.
            runs_json=$(gh run list \
              --repo "$owner/$repo" \
              --workflow sdk_generation.yaml \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt || true)
            # `|| true` also on jq: non-JSON output (partial gh failure) must
            # loop to the next retry, not abort the step under -e -o pipefail.
            run_id=$(echo "${runs_json:-[]}" | jq -r --arg after "$dispatched_after" \
              '[.[] | select(.createdAt >= $after)] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' \
              2>/dev/null || true)
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$run_id" ]; then
            echo "::error::Failed to locate dispatched workflow run for $owner/$repo after $dispatched_after"
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/$owner/$repo/actions/runs/$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for SDK workflow
        env:
          GH_TOKEN: ${{ secrets.SDK_REPOS_PAT }}
          REPO: ${{ matrix.repo }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          owner="frain-dev"
          repo="$REPO"
          run_id="$RUN_ID"

          # ~90 minutes (180 × 30s). Speakeasy generation plus PR creation can
          # exceed a shorter window under load or free-tier limits.
          for _ in $(seq 1 180); do
            # Tolerate transient API failures (gh errors or non-JSON output);
            # retry on the next tick instead of aborting under -e -o pipefail.
            resp=$(gh api "repos/$owner/$repo/actions/runs/$run_id" || true)
            status=$(echo "${resp:-{}}" | jq -r '.status // empty' 2>/dev/null || true)
            conclusion=$(echo "${resp:-{}}" | jq -r '.conclusion // empty' 2>/dev/null || true)
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" != "success" ]; then
                echo "::error::$repo SDK generation failed: $conclusion"
                exit 1
              fi
              exit 0
            fi
            sleep 30
          done

          echo "::error::Timed out waiting for $repo SDK generation"
          exit 1

      - name: Link SDK PR in summary
        if: success()
        env:
          GH_TOKEN: ${{ secrets.SDK_REPOS_PAT }}
          REPO: ${{ matrix.repo }}
          BRANCH: ${{ steps.branch.outputs.name }}
          RUN_URL: ${{ steps.dispatch.outputs.run_url }}
        run: |
          owner="frain-dev"
          repo="$REPO"
          branch="$BRANCH"

          pr_url=$(gh pr list \
            --repo "$owner/$repo" \
            --head "$branch" \
            --json url \
            --jq '.[0].url // empty')

          if [ -n "$pr_url" ]; then
            echo "SDK_PR=$pr_url" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Workflow: $RUN_URL" >> "$GITHUB_STEP_SUMMARY"
          fi
