# Spec-repo Speakeasy workflow for Convoy public API.
# Downstream SDK repos (convoy.js / convoy-python) consume the committed
# OpenAPI document from GitHub; this file documents the source of truth and
# can later publish to the Speakeasy registry when a workspace is connected.
workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
  convoy:
    inputs:
      - location: docs/v3/openapi3.yaml
targets: {}
